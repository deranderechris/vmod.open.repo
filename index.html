<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>D.A. Offene Kodi Repo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        background: #0d0d0d;
        font-family: Arial, sans-serif;
        color: #ffffff;
    }
    header {
        padding: 20px;
        text-align: center;
        background: #111;
        border-bottom: 2px solid #333;
        font-size: 26px;
        font-weight: bold;
    }
    .container {
        padding: 20px;
        max-width: 900px;
        margin: auto;
    }
    select {
        background: #1a1a1a;
        color: #fff;
        border: 1px solid #333;
        padding: 8px;
        margin-bottom: 20px;
        width: 100%;
        border-radius: 5px;
    }
    .addon {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 15px;
        margin-top: 12px;
    }
    .addon-title {
        font-size: 18px;
        font-weight: bold;
        color: #fff;
    }
    .addon-category {
        color: #888;
        font-size: 14px;
        margin-top: 4px;
    }
    .addon-desc {
        color: #ccc;
        font-size: 14px;
        margin-top: 8px;
        line-height: 1.4;
    }
    .addon-link {
        display: inline-block;
        margin-top: 10px;
        color: #aaa;
        text-decoration: none;
        font-size: 14px;
    }
    .addon-link:hover {
        color: #fff;
    }
</style>
</head>

<body>

<header>D.A. Offene Kodi Repo</header>

<div class="container">

    <select id="categoryFilter">
        <option value="all">Alle Kategorien</option>
        <option value="TV">TV</option>
        <option value="Erotik">Erotik</option>
        <option value="Video">Video</option>
        <option value="Programm">Programm</option>
        <option value="Script">Script</option>
    </select>

    <div id="addonList"></div>
</div>

<script>
function shorten(text, max = 200) {
    return text.length > max ? text.substring(0, max) + "…" : text;
}

function getBestDescription(addon) {
    const descriptions = addon.getElementsByTagName("description");
    let de = null, en = null, fallback = null;

    for (let d of descriptions) {
        const lang = d.getAttribute("lang");
        if (lang === "de") de = d.textContent;
        else if (lang === "en") en = d.textContent;
        else if (!lang) fallback = d.textContent;
    }
    return de || en || fallback || "";
}

async function loadAddons() {
    const response = await fetch("addons.xml");
    const xmlText = await response.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(xmlText, "text/xml");

    const addons = xml.getElementsByTagName("addon");
    const addonList = document.getElementById("addonList");

    const addonArray = [];

    for (let addon of addons) {
        const id = addon.getAttribute("id");
        const name = addon.getElementsByTagName("name")[0]?.textContent || id;
        const desc = getBestDescription(addon);

        let category = "Sonstiges";
        const ext = addon.getElementsByTagName("extension")[0];

        if (ext) {
            const point = ext.getAttribute("point") || "";
            if (point.includes("video")) category = "Video";
            else if (point.includes("audio")) category = "Audio";
            else if (point.includes("program")) category = "Programm";
            else if (point.includes("script")) category = "Script";
            else if (point.includes("skin")) category = "Skins";
            else if (point.includes("repository")) category = "Repository";
        }

        addonArray.push({ id, name, desc, category });
    }

    renderAddons(addonArray);

    document.getElementById("categoryFilter").addEventListener("change", () => {
        const selected = document.getElementById("categoryFilter").value;
        if (selected === "all") renderAddons(addonArray);
        else renderAddons(addonArray.filter(a => a.category === selected));
    });
}

function renderAddons(addons) {
    const addonList = document.getElementById("addonList");
    addonList.innerHTML = "";

    addons.forEach(addon => {
        const div = document.createElement("div");
        div.className = "addon";

        div.innerHTML = `
            <div class="addon-title">${addon.name}</div>
            <div class="addon-category">${addon.category}</div>
            <div class="addon-desc">${shorten(addon.desc, 300)}</div>
            <a class="addon-link" href="addon.html?id=${addon.id}">Details anzeigen →</a>
        `;

        addonList.appendChild(div);
    });
}

loadAddons();
</script>

</body>
</html>
