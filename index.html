/* Deterministische Kategorisierung (Priorität video→audio→program→image→service→other) */
function norm(s){ return (s||'').toString().replace(/^\uFEFF/,'').trim().toLowerCase(); }
function inferCategory(text){
  const t = norm(text);
  if(/plugin[\._-]?video|(^|[^a-z0-9])video([^a-z0-9]|$)/i.test(t)) return 'video';
  if(/plugin[\._-]?(audio|music)|(^|[^a-z0-9])(audio|music)([^a-z0-9]|$)/i.test(t)) return 'audio';
  if(/plugin[\._-]?program|(^|[^a-z0-9])program([^a-z0-9]|$)|\bscript\b/i.test(t)) return 'program';
  if(/plugin[\._-]?image|image|pdfreader|picture|gallery|skin/i.test(t)) return 'image';
  if(/\bservice\b|\bdaemon\b/i.test(t)) return 'service';
  return 'other';
}

/* Erzeuge ID (Basis ohne Versionssuffix) */
function deriveId(filename){
  let base = filename.replace(/\.zip$/i,'');
  // Entferne bekannte Version‑Suffixe: -digit oder -digit... oder -YYYY.MM.DD etc.
  // Suche das erste '-' gefolgt von einer Zahl oder ein typisches version pattern
  const m = base.match(/^(.*?)(-\d[\w\.\+\-]*.*)$/);
  if(m) return m[1];
  // Falls kein match, fallback: entferne trailing .zip already done
  return base;
}

/* Baue Map id -> versions */
function buildMap(list){
  const map = new Map();
  list.forEach(fn=>{
    const id = deriveId(fn);
    const name = id;
    const cat = inferCategory(fn + ' ' + id);
    if(!map.has(id)) map.set(id, []);
    map.get(id).push({filename: fn, id, name, category: cat});
  });
  // Sortiere Versionen lexikographisch (stabil)
  for(const [k,arr] of map.entries()){
    arr.sort((a,b)=> a.filename.localeCompare(b.filename));
  }
  return map;
}

/* Render */
function render(){
  const container = document.getElementById('addons');
  container.innerHTML = '';
  const map = buildMap(ZIP_LIST);
  const ids = Array.from(map.keys()).sort((a,b)=> a.localeCompare(b));
  ids.forEach(id=>{
    const versions = map.get(id);
    // Für jede Version eine Zeile (Versionen verlinken auf addon.html?id=ID)
    versions.forEach(v=>{
      const art = document.createElement('article');
      art.className = 'addon-item';
      art.setAttribute('data-id', v.id);
      art.setAttribute('data-name', v.name);
      art.setAttribute('data-filename', v.filename);
      art.setAttribute('data-provides', v.category);

      const left = document.createElement('div'); left.className='left';
      const titleLine = document.createElement('div');
      const nameEl = document.createElement('span'); nameEl.className='addon-name';
      nameEl.textContent = v.name;
      const badge = document.createElement('span'); badge.className = 'badge ' + v.category;
      badge.textContent = v.category;
      titleLine.appendChild(nameEl);
      titleLine.appendChild(badge);

      const meta = document.createElement('div'); meta.className='meta filename';
      meta.textContent = v.filename;

      left.appendChild(titleLine);
      left.appendChild(meta);

      const right = document.createElement('div'); right.className='right';
      const versionsLink = document.createElement('a'); versionsLink.className='inline';
      versionsLink.href = 'addon.html?id=' + encodeURIComponent(v.id);
      versionsLink.textContent = 'Versionen';
      const dl = document.createElement('a'); dl.className='download-link';
      dl.href = 'releases/' + encodeURIComponent(v.filename);
      dl.setAttribute('download','');
      dl.textContent = 'Download';
      right.appendChild(versionsLink);
      right.appendChild(dl);

      art.appendChild(left);
      art.appendChild(right);
      container.appendChild(art);
    });
  });
}

/* Filter */
document.addEventListener('DOMContentLoaded', function(){
  render();
  const filter = document.getElementById('filter');
  filter.addEventListener('input', function(){
    const q = norm(this.value);
    const items = Array.from(document.querySelectorAll('.addon-item'));
    items.forEach(it=>{
      const hay = (it.getAttribute('data-name')||'') + ' ' + (it.getAttribute('data-provides')||'') + ' ' + (it.getAttribute('data-filename')||'');
      if(q === '' || norm(hay).indexOf(q) !== -1) it.classList.remove('hidden');
      else it.classList.add('hidden');
    });
  });
});
