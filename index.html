<style>
  :root{
    --bg:#071018; --card:#0f1720; --muted:#9aa6b2; --accent:#7dd3fc; --accent-2:#60a5fa;
    --border:rgba(255,255,255,0.04); --glass:rgba(255,255,255,0.03);
  }
  html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;color:#e6eef6;background:linear-gradient(180deg,#041018,#071018);-webkit-font-smoothing:antialiased}
  .wrap{max-width:1200px;margin:28px auto;padding:20px}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px}
  h1{font-size:1.1rem;margin:0;font-weight:600}
  .lead{color:var(--muted);font-size:0.92rem}
  .controls{display:flex;gap:12px;align-items:center;margin-top:14px}
  .search{background:var(--card);border:1px solid var(--border);padding:10px 12px;border-radius:10px;color:inherit;min-width:320px}
  .repo-zip{background:linear-gradient(90deg,var(--accent),var(--accent-2));color:#04263b;padding:10px 14px;border-radius:10px;text-decoration:none;font-weight:700;box-shadow:0 6px 18px rgba(96,165,250,0.08)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;margin-top:18px}
  .card{background:linear-gradient(180deg,rgba(255,255,255,0.02),var(--glass));border:1px solid var(--border);padding:12px;border-radius:12px;display:flex;flex-direction:column;gap:8px}
  .title-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .addon-name{font-weight:600;color:#eaf6ff;word-break:break-all}
  .filename{font-family:ui-monospace,monospace;color:var(--muted);font-size:0.86rem}
  .row-actions{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
  .link{background:transparent;border:1px solid rgba(255,255,255,0.04);padding:8px 10px;border-radius:8px;color:var(--accent);text-decoration:none;font-weight:600;display:inline-block}
  .download{background:rgba(125,211,252,0.12);border:1px solid rgba(125,211,252,0.12);padding:8px 10px;border-radius:8px;color:var(--accent);text-decoration:none;font-weight:700;display:inline-block}
  .muted{color:var(--muted);font-size:0.85rem}
  .small{font-size:0.82rem;color:var(--muted)}
  .filters{display:flex;gap:8px;align-items:center}
  .filter-btn{background:transparent;border:1px solid var(--border);padding:6px 10px;border-radius:8px;color:var(--muted);cursor:pointer}
  .filter-btn.active{border-color:var(--accent);color:var(--accent)}
  @media (max-width:520px){ .controls{flex-direction:column;align-items:stretch} .search{width:100%} .row-actions{align-items:flex-start} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>vmod.open.repo — Addons</h1>
      <div class="lead">Übersicht: pro Addon eine Karte. Klick auf "Versionen" für alle ZIPs.</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
      <a class="repo-zip" href="releases/repo.zip" download>Repo ZIP herunterladen</a>
      <div class="small">Manuelle Aktualisierung</div>
    </div>
  </header>

  <div class="controls" style="margin-top:12px">
    <input id="filter" class="search" placeholder="Filter (Name, Kategorie, Dateiname)">
    <div class="filters" aria-hidden="false" style="margin-left:auto">
      <button class="filter-btn active" data-cat="all">Alle</button>
      <button class="filter-btn" data-cat="video">Video</button>
      <button class="filter-btn" data-cat="audio">Audio</button>
      <button class="filter-btn" data-cat="program">Program</button>
      <button class="filter-btn" data-cat="image">Image</button>
      <button class="filter-btn" data-cat="module">Module</button>
      <button class="filter-btn" data-cat="repository">Repository</button>
      <button class="filter-btn" data-cat="service">Service</button>
      <button class="filter-btn" data-cat="other">Other</button>
    </div>
  </div>

  <section id="list" class="grid" aria-live="polite"></section>
</div>

/* Hilfsfunktionen */
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* Kategorisierung erweitert: repository + module */
function inferCategory(s){
  const t = (s||'').toLowerCase();
  if(/^repository\./.test(t)) return 'repository';
  if(/^script\.module\.|^script\.module|^script\.module/.test(t)) return 'module';
  if(/^script\./.test(t) && t.indexOf('module') !== -1) return 'module';
  if(/plugin[\._-]?video|[^a-z]video[^a-z]/.test(t)) return 'video';
  if(/plugin[\._-]?(audio|music)/.test(t)) return 'audio';
  if(/plugin[\._-]?program|^script\./.test(t)) return 'program';
  if(/plugin[\._-]?image|pdfreader|gallery/.test(t)) return 'image';
  if(/service\./.test(t)) return 'service';
  return 'other';
}

/* ID-Ableitung (Versionen entfernen) */
function deriveId(fn){
  const base = fn.replace(/\.zip$/i,'');
  const m = base.match(/^(.*?)(-\d[\w\.\+\-].*|-(mod|matrix|v)\b.*)$/i);
  return m && m[1] ? m[1] : base;
}

/* Map id -> versions */
function buildMap(list){
  const map = new Map();
  list.forEach(fn=>{
    const id = deriveId(fn);
    const cat = inferCategory(fn + ' ' + id);
    if(!map.has(id)) map.set(id, {id, category:cat, versions:[]});
    map.get(id).versions.push({filename:fn});
  });
  for(const g of map.values()) g.versions.sort((a,b)=> a.filename.localeCompare(b.filename));
  return map;
}

/* Render: eine Karte pro Addon-ID; Versionslink unter Download */
function render(filterQ='', filterCat='all'){
  const container = document.getElementById('list');
  container.innerHTML = '';
  const map = buildMap(ZIP_LIST);
  const groups = Array.from(map.values()).sort((a,b)=> a.id.localeCompare(b.id, undefined, {sensitivity:'base'}));
  groups.forEach(group=>{
    if(filterCat !== 'all' && group.category !== filterCat) return;
    const rep = group.versions[group.versions.length - 1];
    const text = (group.id + ' ' + rep.filename + ' ' + group.category).toLowerCase();
    if(filterQ && text.indexOf(filterQ.toLowerCase()) === -1) return;
    const card = document.createElement('div'); card.className='card';
    card.innerHTML = `
      <div class="title-row">
        <div style="min-width:0">
          <div class="addon-name">${escapeHtml(group.id)}</div>
          <div class="filename">${escapeHtml(rep.filename)}</div>
        </div>
        <div class="row-actions">
          <a class="download" href="releases/${encodeURIComponent(rep.filename)}" download>Download</a>
          <a class="link" href="addon.html?id=${encodeURIComponent(group.id)}">Versionen (${group.versions.length})</a>
        </div>
      </div>
      <div class="small muted">Kategorie: ${escapeHtml(group.category)}</div>
    `;
    container.appendChild(card);
  });
}

/* Interaktionen */
document.addEventListener('DOMContentLoaded', ()=>{
  const filter = document.getElementById('filter');
  const btns = Array.from(document.querySelectorAll('.filter-btn'));
  let activeCat = 'all';
  render();
  filter.addEventListener('input', ()=> render(filter.value, activeCat));
  btns.forEach(b=>{
    b.addEventListener('click', ()=>{
      btns.forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      activeCat = b.getAttribute('data-cat') || 'all';
      render(filter.value, activeCat);
    });
  });
});
