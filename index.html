<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>D.A. Offene Kodi Repo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        background: #0d0d0d;
        font-family: Arial, sans-serif;
        color: #ffffff;
    }

    header {
        padding: 20px;
        text-align: center;
        background: #111;
        border-bottom: 2px solid #333;
        font-size: 28px;
        font-weight: bold;
        color: #ffffff;
    }

    #controls {
        display: flex;
        justify-content: center;
        gap: 15px;
        padding: 20px;
        flex-wrap: wrap;
    }

    select, input {
        padding: 10px;
        border-radius: 6px;
        border: none;
        background: #1a1a1a;
        color: #ffffff;
        outline: 1px solid #444;
        font-size: 15px;
    }

    #search {
        width: 260px;
    }

    .list {
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .addon {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 15px;
        cursor: pointer;
        transition: background 0.2s;
    }

    .addon:hover {
        background: #222;
    }

    .addon-title {
        font-size: 20px;
        font-weight: bold;
        color: #ffffff;
        display: flex;
        justify-content: space-between;
    }

    .addon-category {
        font-size: 14px;
        color: #888;
    }

    .addon-desc {
        margin-top: 6px;
        font-size: 14px;
        color: #cccccc;
        max-height: 40px;
        overflow: hidden;
        text-overflow: ellipsis;
    }
</style>
</head>

<body>

<header>VMOD Open Repository</header>

<div id="controls">
    <input id="search" type="text" placeholder="Addons durchsuchen…">
    <select id="categoryFilter">
        <option value="all">Alle Kategorien</option>
    </select>
</div>

<div class="list" id="addonList"></div>

<script>
let addonsById = {};

function shorten(text, max = 80) {
    return text.length > max ? text.substring(0, max) + "…" : text;
}

async function loadAddons() {
    const response = await fetch("addons.xml");
    const xmlText = await response.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(xmlText, "text/xml");

    const addons = xml.getElementsByTagName("addon");
    const categories = new Set();

    for (let addon of addons) {
        const id = addon.getAttribute("id");
        const version = addon.getAttribute("version");
        const name = addon.getElementsByTagName("name")[0]?.textContent || id;
        const desc = addon.getElementsByTagName("description")[0]?.textContent || "";

        let category = "Sonstiges";
        const ext = addon.getElementsByTagName("extension")[0];
        if (ext) {
            const point = ext.getAttribute("point") || "";
            if (point.includes("video")) category = "Video";
            else if (point.includes("audio")) category = "Audio";
            else if (point.includes("program")) category = "Programme";
            else if (point.includes("skin")) category = "Skins";
            else if (point.includes("repository")) category = "Repository";
        }

        categories.add(category);

        if (!addonsById[id]) {
            addonsById[id] = {
                id, name, desc, category, versions: []
            };
        }

        addonsById[id].versions.push(version);
    }

    const sortedCats = Array.from(categories).sort();

    const catSelect = document.getElementById("categoryFilter");
    catSelect.innerHTML = `<option value="all">Alle Kategorien</option>`;

    sortedCats.forEach(cat => {
        const opt = document.createElement("option");
        opt.value = cat;
        opt.textContent = cat;
        catSelect.appendChild(opt);
    });

    renderAddons();
}

function renderAddons() {
    const list = document.getElementById("addonList");
    list.innerHTML = "";

    const searchTerm = document.getElementById("search").value.toLowerCase();
    const selectedCat = document.getElementById("categoryFilter").value;

    Object.values(addonsById).forEach(addon => {
        if (!addon.name.toLowerCase().includes(searchTerm)) return;
        if (selectedCat !== "all" && addon.category !== selectedCat) return;

        const row = document.createElement("div");
        row.className = "addon";
        row.onclick = () => {
            window.location.href = `addon.html?id=${addon.id}`;
        };

        row.innerHTML = `
            <div class="addon-title">
                <span>${shorten(addon.name, 60)}</span>
                <span class="addon-category">${addon.category}</span>
            </div>
            <div class="addon-desc">${shorten(addon.desc, 160)}</div>
        `;

        list.appendChild(row);
    });
}

document.getElementById("search").addEventListener("input", renderAddons);
document.getElementById("categoryFilter").addEventListener("change", renderAddons);

loadAddons();
</script>

</body>
</html>
