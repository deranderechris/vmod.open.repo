      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    header {
      background: #181818;
      padding: 2rem 1rem 1rem 1rem;
      text-align: center;
      border-bottom: 2px solid #00ff90;
      box-shadow: 0 2px 8px #00ff9033;
    }
    h1 {
      margin: 0;
      font-size: 2.5rem;
      letter-spacing: 2px;
      color: #00ff90;
      text-shadow: 0 0 8px #00ff90cc;
    }
    .addon-list {
      max-width: 900px;
      margin: 2rem auto;
      background: #181818;
      border-radius: 10px;
      box-shadow: 0 0 16px #00ff9022;
      padding: 2rem;
      border: 1px solid #00ff90;
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      justify-content: space-between;
    }
    .addon-group {
      flex: 1 1 350px;
      min-width: 320px;
        .addon-list {
          max-width: 1200px;
          margin: 2rem auto;
          background: #181818;
          border-radius: 18px;
          box-shadow: 0 0 32px #00ff90aa, 0 0 80px #00ff9022 inset;
          padding: 2.5rem 2rem;
          border: 2px solid #00ff90;
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 2.5rem 2rem;
        }
      margin-bottom: 0.7rem;
      letter-spacing: 1px;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    li {
      padding: 0.5rem 0;
      border-bottom: 1px dashed #00ff90;
      font-size: 1.05rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    li:last-child {
      border-bottom: none;
    }
    .addon-icon {
      width: 20px;
      height: 20px;
      background: #00ff90;
      border-radius: 4px;
      display: inline-block;
      margin-right: 0.5rem;
      box-shadow: 0 0 8px #00ff90cc;
    }
    .footer {
      text-align: center;
      color: #00ff90aa;
      font-size: 0.9rem;
      margin: 2rem 0 1rem 0;
    }
    a {
      color: #00ff90;
      text-decoration: underline;
      transition: color 0.2s;
    }
    a:hover {
      color: #00ffaa;
    }
  </style>
  <link href="https://fonts.googleapis.com/css?family=Fira+Mono:400,700&display=swap" rel="stylesheet">

    const groupOrder = [
      "Video Addons",
      "Audio Addons",
      "Programme",
      "Module",
      "Repositories",
      "Skripte",
      "Services",
      "Sonstiges"
    ];
    const groupContainer = document.getElementById('addonGroups');
    const makeAddonUrl = zip => `https://github.com/deranderechris/vmod.open.repo/raw/main/${encodeURIComponent(zip)}`;
      // Hilfsfunktion: Addons nach Name gruppieren, Versionen als Array
      function groupAddonsByName(zips) {
        const map = {};
        zips.forEach(zip => {
          // Name = alles vor dem letzten -version.zip
          const match = zip.match(/^(.*?)-([\d\w.+]+)\.zip$/);
          if (!match) return;
          const name = match[1];
          if (!map[name]) map[name] = [];
          map[name].push(zip);
        });
        // Versionen sortieren (neueste zuerst, grob nach String)
        Object.keys(map).forEach(name => {
          map[name].sort((a, b) => b.localeCompare(a));
        });
        return map;
      }
    groupOrder.forEach(group => {
      if (!addonGroups[group] || addonGroups[group].length === 0) return;
      const div = document.createElement('div');
      div.className = 'addon-group';
      div.innerHTML = `<h3>${group}</h3>`;
        const addonsByName = groupAddonsByName(addonGroups[group]);
        Object.keys(addonsByName).forEach(addonName => {
          const tile = document.createElement('div');
          tile.className = 'addon-tile';
          tile.innerHTML = `<span class="addon-icon"></span><span class="addon-name">${addonName}</span>`;
          // Accordion-Container für Versionen
          const versionsDiv = document.createElement('div');
          versionsDiv.className = 'addon-versions';
          addonsByName[addonName].forEach(zip => {
            const url = makeAddonUrl(zip);
            const version = zip.match(/-([\d\w.+]+)\.zip$/)?.[1] || zip;
            const a = document.createElement('a');
            a.className = 'addon-version-link';
            a.href = url;
            a.download = '';
            a.textContent = `Version ${version}`;
            versionsDiv.appendChild(a);
          });
          tile.appendChild(versionsDiv);
          tile.addEventListener('click', function(e) {
            // Accordion: Nur ein Tile pro Gruppe offen
            const all = div.querySelectorAll('.addon-versions');
            all.forEach(v => { if (v !== versionsDiv) v.classList.remove('active'); });
            versionsDiv.classList.toggle('active');
            e.stopPropagation();
          });
          div.appendChild(tile);
        });
      groupContainer.appendChild(div);
    });
