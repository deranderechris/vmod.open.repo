<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kodi Repo Übersicht</title>
  <style>
                html, body {
                  background: #000 !important;
                }
            /* Vertikaler Trennstrich zwischen den Gruppen */
            .addon-list {
              position: relative;
            }
            .addon-list::before {
              content: "";
              position: absolute;
              top: 2rem;
              bottom: 2rem;
              left: 50%;
              width: 2px;
              background: linear-gradient(to bottom, #00ff90cc 10%, #10101000 90%);
              z-index: 1;
              border-radius: 2px;
              pointer-events: none;
            }
            /* Abstand zwischen Addon-Kacheln */
            .addon-group {
              display: flex;
              flex-direction: column;
              gap: 1mm;
              position: relative;
              z-index: 2;
            }
        .addon-tile {
          background: #181f1b;
          border-radius: 10px;
          margin-bottom: 1.1rem;
          box-shadow: 0 0 16px #00ff90cc, 0 0 32px #00ff9022;
          padding: 0.7rem 1rem;
          transition: box-shadow 0.2s, background 0.2s;
          border: 1px solid #00ff9033;
          cursor: pointer;
          position: relative;
          display: flex;
          align-items: center;
          gap: 0.7rem;
        }
        .addon-tile:hover {
          background: #1a2d22;
          box-shadow: 0 0 32px #00ff90, 0 0 48px #00ff90cc;
        }
        .addon-tile .addon-icon {
          width: 28px;
          height: 28px;
          background: linear-gradient(135deg, #00ff90 60%, #00ffea 100%);
          border-radius: 8px;
          display: inline-block;
          margin-right: 0.7rem;
          box-shadow: 0 0 12px #00ff90cc;
          flex-shrink: 0;
        }
        .addon-tile .addon-name {
          font-size: 1.1rem;
          color: #00ffea;
          font-weight: bold;
          letter-spacing: 1px;
          text-shadow: 0 0 6px #00ff90cc;
        }
        .addon-versions {
          display: none;
          flex-direction: column;
          margin-top: 0.5rem;
          margin-left: 2.5rem;
          gap: 0.3rem;
          animation: fadeIn 0.3s;
        }
        .addon-versions.active {
          display: flex;
        }
        .addon-version-link {
          color: #00ffaa;
          background: #101a13;
          border-radius: 6px;
          padding: 0.2rem 0.7rem;
          font-size: 0.98rem;
          margin-bottom: 0.1rem;
          text-decoration: none;
          box-shadow: 0 0 12px #00ff90cc, 0 0 24px #00ff9022;
          transition: background 0.2s, color 0.2s, box-shadow 0.2s;
          border: 1px solid #00ff9033;
          display: inline-block;
        }
        .addon-version-link:hover {
          background: #00ff90;
          color: #101010;
          box-shadow: 0 0 32px #00ff90, 0 0 48px #00ff90cc;
        }
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(-10px); }
          to { opacity: 1; transform: translateY(0); }
        }
  </style>
  <link href="https://fonts.googleapis.com/css?family=Fira+Mono:400,700&display=swap" rel="stylesheet">
</head>

    const groupOrder = [
      "Video Addons",
      "Audio Addons",
      "Programme",
      "Module",
      "Repositories",
      "Skripte",
      "Services",
      "Sonstiges"
    ];
    const groupContainer = document.getElementById('addonGroups');
    const makeAddonUrl = zip => `https://github.com/deranderechris/vmod.open.repo/raw/main/${encodeURIComponent(zip)}`;
      // Hilfsfunktion: Addons nach Name gruppieren, Versionen als Array
      function groupAddonsByName(zips) {
        const map = {};
        zips.forEach(zip => {
          // Name = alles vor dem letzten -version.zip
          const match = zip.match(/^(.*?)-([\d\w.+]+)\.zip$/);
          if (!match) return;
          const name = match[1];
          if (!map[name]) map[name] = [];
          map[name].push(zip);
        });
        // Versionen sortieren (neueste zuerst, grob nach String)
        Object.keys(map).forEach(name => {
          map[name].sort((a, b) => b.localeCompare(a));
        });
        return map;
      }
    groupOrder.forEach(group => {
      if (!addonGroups[group] || addonGroups[group].length === 0) return;
      const div = document.createElement('div');
      div.className = 'addon-group';
      div.innerHTML = `<h3>${group}</h3>`;
        const addonsByName = groupAddonsByName(addonGroups[group]);
        Object.keys(addonsByName).forEach(addonName => {
          const tile = document.createElement('div');
          tile.className = 'addon-tile';
          tile.innerHTML = `<span class="addon-icon"></span><span class="addon-name">${addonName}</span>`;
          // Accordion-Container für Versionen
          const versionsDiv = document.createElement('div');
          versionsDiv.className = 'addon-versions';
          addonsByName[addonName].forEach(zip => {
            const url = makeAddonUrl(zip);
            const version = zip.match(/-([\d\w.+]+)\.zip$/)?.[1] || zip;
            const a = document.createElement('a');
            a.className = 'addon-version-link';
            a.href = url;
            a.download = '';
            a.textContent = `Version ${version}`;
            versionsDiv.appendChild(a);
          });
          tile.appendChild(versionsDiv);
          tile.addEventListener('click', function(e) {
            // Accordion: Nur ein Tile pro Gruppe offen
            const all = div.querySelectorAll('.addon-versions');
            all.forEach(v => { if (v !== versionsDiv) v.classList.remove('active'); });
            versionsDiv.classList.toggle('active');
            e.stopPropagation();
          });
          div.appendChild(tile);
        });
      groupContainer.appendChild(div);
    });
