<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>D.A. Offene Kodi Repo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        background: #0d0d0d;
        font-family: Arial, sans-serif;
        color: #ffffff;
    }

    header {
        padding: 20px;
        text-align: center;
        background: #111;
        border-bottom: 2px solid #333;
        font-size: 26px;
        font-weight: bold;
    }

    .container {
        padding: 20px;
        max-width: 900px;
        margin: auto;
    }

    .desc {
        margin-top: 10px;
        color: #cccccc;
        font-size: 15px;
        line-height: 1.5;
    }

    .category {
        margin-top: 5px;
        color: #888;
        font-size: 14px;
    }

    .versions-title {
        margin-top: 30px;
        font-size: 20px;
        font-weight: bold;
        border-bottom: 1px solid #333;
        padding-bottom: 8px;
    }

    .version {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 15px;
        margin-top: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .version span {
        font-size: 16px;
        color: #ffffff;
    }

    .download-btn {
        padding: 8px 14px;
        background: #333;
        color: #ffffff;
        border-radius: 5px;
        text-decoration: none;
        font-size: 14px;
        border: 1px solid #444;
        transition: background 0.2s;
    }

    .download-btn:hover {
        background: #444;
    }

    .back {
        margin-top: 25px;
        display: inline-block;
        color: #aaa;
        font-size: 14px;
        text-decoration: none;
    }

    .back:hover {
        color: #fff;
    }
</style>
</head>

<body>

<header>D.A. Offene Kodi Repo</header>

<div class="container">
    <h2 id="addonName"></h2>
    <div class="category" id="addonCategory"></div>
    <div class="desc" id="addonDesc"></div>

    <div class="versions-title">Versionen</div>
    <div id="versionList"></div>

    <a href="index.html" class="back">← Zurück zur Übersicht</a>
</div>

<script>
function shorten(text, max = 200) {
    return text.length > max ? text.substring(0, max) + "…" : text;
}

// Nur DE → EN → Fallback
function getBestDescription(addon) {
    const descriptions = addon.getElementsByTagName("description");

    let de = null, en = null, fallback = null;

    for (let d of descriptions) {
        const lang = d.getAttribute("lang");

        if (lang === "de") de = d.textContent;
        else if (lang === "en") en = d.textContent;
        else if (!lang) fallback = d.textContent;
    }

    return de || en || fallback || "";
}

async function loadAddon() {
    const params = new URLSearchParams(window.location.search);
    const addonId = params.get("id");

    const response = await fetch("addons.xml");
    const xmlText = await response.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(xmlText, "text/xml");

    const addons = xml.getElementsByTagName("addon");
    let addonData = null;

    for (let addon of addons) {
        if (addon.getAttribute("id") === addonId) {
            const name = addon.getElementsByTagName("name")[0]?.textContent || addonId;
            const desc = getBestDescription(addon);

            let category = "Sonstiges";
            const ext = addon.getElementsByTagName("extension")[0];
            if (ext) {
                const point = ext.getAttribute("point") || "";
                if (point.includes("video")) category = "Video";
                else if (point.includes("audio")) category = "Audio";
                else if (point.includes("program")) category = "Programm";
                else if (point.includes("script")) category = "Script";
                else if (point.includes("skin")) category = "Skins";
                else if (point.includes("repository")) category = "Repository";
            }

            addonData = { name, desc, category, versions: [] };
        }
    }

    if (!addonData) return;

    for (let addon of addons) {
        if (addon.getAttribute("id") === addonId) {
            addonData.versions.push(addon.getAttribute("version"));
        }
    }

    addonData.versions.sort((a, b) => b.localeCompare(a, undefined, { numeric: true }));

    document.getElementById("addonName").textContent = addonData.name;
    document.getElementById("addonCategory").textContent = addonData.category;
    document.getElementById("addonDesc").textContent = shorten(addonData.desc, 500);

    const versionList = document.getElementById("versionList");

    addonData.versions.forEach(version => {
        const row = document.createElement("div");
        row.className = "version";

        const zipName = `${addonId}-${version}.zip`;

        row.innerHTML = `
            <span>Version ${version}</span>
            <a class="download-btn" href="${zipName}" download>Download</a>
        `;

        versionList.appendChild(row);
    });
}

loadAddon();
</script>

</body>
</html>
