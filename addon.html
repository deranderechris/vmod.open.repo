  .download{background:var(--accent);color:#04263b;padding:8px 12px;border-radius:8px;text-decoration:none;font-weight:700}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function deriveId(fn){ const base = fn.replace(/\.zip$/i,''); const m = base.match(/^(.*?)(-\d[\w\.\+\-].*|-(mod|matrix|v)\b.*)$/i); return m && m[1] ? m[1] : base; }

function getParam(n){ return new URLSearchParams(location.search).get(n); }

document.addEventListener('DOMContentLoaded', ()=>{
  const id = getParam('id') || '';
  const title = document.getElementById('title');
  const subtitle = document.getElementById('subtitle');
  const container = document.getElementById('versions');
  if(!id){ title.textContent='Kein Addon angegeben'; subtitle.textContent='Aufruf: addon.html?id=plugin.video.macvod'; return; }
  title.textContent = id;
  const versions = ZIP_LIST.filter(fn=> deriveId(fn).toLowerCase() === id.toLowerCase()).sort((a,b)=> a.localeCompare(b));
  if(versions.length === 0){ subtitle.textContent = 'Keine Versionen gefunden für: ' + id; return; }
  subtitle.textContent = 'Versionen: ' + versions.length;
  versions.forEach(fn=>{
    const el = document.createElement('div'); el.className='version';
    el.innerHTML = `<div class="filename">${escapeHtml(fn)}</div><div><a class="download" href="releases/${encodeURIComponent(fn)}" download>Download</a></div>`;
    container.appendChild(el);
  });
});
