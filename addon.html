function norm(s){ return (s||'').toString().replace(/^\uFEFF/,'').trim().toLowerCase(); }
function inferCategory(text){
  const t = norm(text);
  if(/plugin[\._-]?video|(^|[^a-z0-9])video([^a-z0-9]|$)/i.test(t)) return 'video';
  if(/plugin[\._-]?(audio|music)|(^|[^a-z0-9])(audio|music)([^a-z0-9]|$)/i.test(t)) return 'audio';
  if(/plugin[\._-]?program|(^|[^a-z0-9])program([^a-z0-9]|$)|\bscript\b/i.test(t)) return 'program';
  if(/plugin[\._-]?image|image|pdfreader|picture|gallery|skin/i.test(t)) return 'image';
  if(/\bservice\b|\bdaemon\b/i.test(t)) return 'service';
  return 'other';
}

function deriveId(filename){
  let base = filename.replace(/\.zip$/i,'');
  const m = base.match(/^(.*?)(-\d[\w\.\+\-]*.*)$/);
  if(m) return m[1];
  return base;
}

function getQueryParam(name){
  const params = new URLSearchParams(window.location.search);
  return params.get(name);
}

function buildVersionsFor(id){
  if(!id) return [];
  const lower = id.toLowerCase();
  const matches = ZIP_LIST.filter(fn=>{
    const base = fn.replace(/\.zip$/i,'').toLowerCase();
    return base.startsWith(lower);
  });
  return matches.sort((a,b)=> a.localeCompare(b));
}

document.addEventListener('DOMContentLoaded', function(){
  const id = getQueryParam('id') || '';
  const title = document.getElementById('title');
  const subtitle = document.getElementById('subtitle');
  const container = document.getElementById('versions');

  if(!id){
    title.textContent = 'Kein Addon angegeben';
    subtitle.textContent = 'Rufe diese Seite mit ?id=plugin.id auf, z. B. addon.html?id=plugin.video.macvod';
    return;
  }

  title.textContent = id;
  const versions = buildVersionsFor(id);
  if(versions.length === 0){
    subtitle.textContent = 'Keine Versionen gefunden für: ' + id;
    return;
  }

  const cat = inferCategory(versions[0] + ' ' + id);
  subtitle.textContent = 'Kategorie: ' + cat;

  versions.forEach(fn=>{
    const div = document.createElement('div'); div.className='version';
    const left = document.createElement('div');
    const name = document.createElement('div'); name.className='filename'; name.textContent = fn;
    left.appendChild(name);
    const right = document.createElement('div');
    const dl = document.createElement('a'); dl.className='download'; dl.href = 'releases/' + encodeURIComponent(fn); dl.setAttribute('download',''); dl.textContent = 'Download';
    right.appendChild(dl);
    div.appendChild(left);
    div.appendChild(right);
    container.appendChild(div);
  });
});
