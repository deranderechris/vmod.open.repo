<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Addon Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        background: #0d0d0d;
        font-family: Arial, sans-serif;
        color: #ffffff;
    }

    header {
        padding: 20px;
        text-align: center;
        background: #111;
        border-bottom: 2px solid #333;
        font-size: 24px;
        font-weight: bold;
    }

    .container {
        padding: 20px;
        max-width: 900px;
        margin: auto;
    }

    .section {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 15px;
        margin-top: 12px;
    }

    .title {
        font-size: 20px;
        font-weight: bold;
        color: #fff;
    }

    .label {
        font-size: 14px;
        color: #888;
        margin-top: 6px;
    }

    .desc {
        font-size: 14px;
        color: #ccc;
        margin-top: 10px;
        line-height: 1.4;
    }

    .download {
        display: inline-block;
        margin-top: 15px;
        padding: 10px 14px;
        background: #333;
        color: #fff;
        border-radius: 5px;
        text-decoration: none;
        font-size: 14px;
    }

    .download:hover {
        background: #555;
    }

    .back {
        display: inline-block;
        margin-top: 20px;
        color: #aaa;
        text-decoration: none;
        font-size: 14px;
    }

    .back:hover {
        color: #fff;
    }
</style>
</head>

<body>

<header>Addon Details</header>

<div class="container">
    <div id="content"></div>
    <a class="back" href="index.html">← Zurück zur Übersicht</a>
</div>

<script>
function getBestDescription(addon) {
    const descriptions = addon.getElementsByTagName("description");
    let de = null, en = null, fallback = null;

    for (let d of descriptions) {
        const lang = d.getAttribute("lang");
        if (lang === "de") de = d.textContent;
        else if (lang === "en") en = d.textContent;
        else if (!lang) fallback = d.textContent;
    }
    return de || en || fallback || "";
}

async function loadAddon() {
    const params = new URLSearchParams(window.location.search);
    const addonId = params.get("id");

    if (!addonId) {
        document.getElementById("content").innerHTML = "<p>Kein Addon angegeben.</p>";
        return;
    }

    const response = await fetch("addons.xml");
    const xmlText = await response.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(xmlText, "text/xml");

    const addons = xml.getElementsByTagName("addon");
    let found = null;

    for (let addon of addons) {
        if (addon.getAttribute("id") === addonId) {
            found = addon;
            break;
        }
    }

    if (!found) {
        document.getElementById("content").innerHTML = "<p>Addon nicht gefunden.</p>";
        return;
    }

    const name = found.getElementsByTagName("name")[0]?.textContent || addonId;
    const version = found.getAttribute("version") || "unbekannt";
    const provider = found.getAttribute("provider-name") || "unbekannt";
    const desc = getBestDescription(found);

    const downloads = found.getElementsByTagName("asset");
    let downloadLink = null;

    for (let d of downloads) {
        if (d.getAttribute("type") === "zip") {
            downloadLink = d.textContent;
            break;
        }
    }

    if (!downloadLink) {
        downloadLink = addonId + "-" + version + ".zip";
    }

    document.getElementById("content").innerHTML = `
        <div class="section">
            <div class="title">${name}</div>
            <div class="label">Version: ${version}</div>
            <div class="label">Anbieter: ${provider}</div>
            <div class="desc">${desc}</div>
            <a class="download" href="${downloadLink}">ZIP herunterladen</a>
        </div>
    `;
}

loadAddon();
</script>

</body>
</html>
